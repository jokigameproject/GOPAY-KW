<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>E-Wallet</title>
<style>
body {
  font-family: Arial;
  background: #0b1f2a;
  color: white;
  text-align: center;
}
.card {
  background: #123;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}
button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #00aaff;
  color: white;
  cursor: pointer;
}
input {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}
.hidden { display:none; }
</style>
</head>

<body>

<h1>💳 GOPAY</h1>

<div id="home" class="card">
  <h2>Saldo: Rp<span id="saldo"></span></h2>
  <button onclick="show('pay')">📷 Pay QR</button>
  <button onclick="show('voucher')">🎟️ Voucher</button>
  <button onclick="topup()">💰 Top Up</button>
  <button onclick="showAdmin()">⚙️ Admin</button>
</div>

<!-- PAY -->
<div id="pay" class="card hidden">
  <h2>Scan QR</h2>
  <input id="qrInput" placeholder="Masukan kode QR">
  <br>
  <button onclick="pay()">Bayar</button>
  <button onclick="back()">⬅ Back</button>
</div>

<!-- VOUCHER -->
<div id="voucher" class="card hidden">
  <h2>Voucher Saya</h2>
  <div id="voucherList"></div>
  <button onclick="back()">⬅ Back</button>
</div>

<!-- ADMIN -->
<div id="admin" class="card hidden">
  <h2>Admin Panel</h2>
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="adminMenu" class="hidden">
    <h3>Saldo</h3>
    <button onclick="setSaldo()">Set Saldo</button>

    <h3>Generate QR</h3>
    <button onclick="genQR()">Generate QR</button>
    <p id="qrCode"></p>

    <h3>Voucher</h3>
    <input id="vName" placeholder="Nama voucher">
    <input id="vDisc" placeholder="Diskon">
    <input id="vExp" placeholder="Kadaluarsa (YYYY-MM-DD)">
    <button onclick="addVoucher()">Tambah Voucher</button>
  </div>

  <button onclick="back()">⬅ Back</button>
</div>

<script>

// ===== STORAGE =====
let saldo = parseInt(localStorage.getItem("saldo")) || 0
let vouchers = JSON.parse(localStorage.getItem("vouchers")) || []
let qrs = JSON.parse(localStorage.getItem("qrs")) || []

function save(){
  localStorage.setItem("saldo", saldo)
  localStorage.setItem("vouchers", JSON.stringify(vouchers))
  localStorage.setItem("qrs", JSON.stringify(qrs))
}

// ===== UI =====
function update(){
  document.getElementById("saldo").innerText = saldo
  renderVoucher()
}

function show(id){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"))
  document.getElementById(id).classList.remove("hidden")
}

function back(){
  show("home")
}

// ===== TOP UP =====
function topup(){
  alert("Top up Di toko terdekat/Bank Terdekat")
}

// ===== PAYMENT =====
function pay(){
  let code = document.getElementById("qrInput").value
  let qr = qrs.find(q=>q.code == code)

  if(!qr) return alert("QR tidak valid")

  let harga = parseInt(qr.price)

  // pilih voucher
  if(vouchers.length > 0){
    let list = vouchers.map((v,i)=> `${i} - ${v.name} (Disc Rp${v.disc})`).join("\n")
    let pilih = prompt("Pilih voucher:\n"+list+"\n(Kosongkan jika tidak pakai)")

    if(pilih !== null && pilih !== ""){
      let v = vouchers[pilih]

      if(!v) return alert("Voucher tidak valid")

      if(new Date() > new Date(v.exp)){
        alert("Voucher expired")
      } else {
        harga -= v.disc
        if(harga < 0) harga = 0

        vouchers.splice(pilih,1)
        alert("Voucher dipakai!")
      }
    }
  }

  if(saldo >= harga){
    saldo -= harga
    alert("Pembayaran berhasil: Rp"+harga)
  } else {
    alert("Saldo kurang")
  }

  save()
  update()
  back()
}

// ===== VOUCHER =====
function renderVoucher(){
  let div = document.getElementById("voucherList")
  div.innerHTML = ""

  vouchers.forEach(v=>{
    div.innerHTML += `
      <p>${v.name} - Diskon Rp${v.disc} - Exp: ${v.exp}</p>
    `
  })
}

function addVoucher(){
  let name = document.getElementById("vName").value
  let disc = parseInt(document.getElementById("vDisc").value)
  let exp = document.getElementById("vExp").value

  if(!name || isNaN(disc) || !exp) return alert("Input salah!")

  vouchers.push({name, disc, exp})
  save()
  alert("Voucher ditambah")
}

// ===== ADMIN =====
function showAdmin(){
  show("admin")
}

function login(){
  if(document.getElementById("pass").value == "1507"){
    document.getElementById("adminMenu").classList.remove("hidden")
  } else alert("Salah")
}

function setSaldo(){
  let s = prompt("Set saldo")
  if(!s || isNaN(s)) return alert("Input salah!")

  saldo = parseInt(s)
  save()
  update()
}

function genQR(){
  let price = prompt("Masukan harga")
  if(!price || isNaN(price)) return alert("Input salah!")

  let code = Math.random().toString(36).substring(2,8)

  qrs.push({code, price})
  save()

  document.getElementById("qrCode").innerText = 
    "Kode: "+code+" | Rp"+price
}

// ===== INIT =====
update()

</script>

</body>
</html>
